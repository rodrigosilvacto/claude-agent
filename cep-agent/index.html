<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consulta de CEP</title>
  <meta name="description" content="Digite um CEP e veja o endereço correspondente na hora." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light dark;

      /* ---- token system ---- */
      --kraft: #f1e6d2;
      --desk: #2a241c;
      --ink: #2a2018;
      --ink-soft: #5b4b39;
      --navy: #23385c;
      --red: #b7422f;
      --sepia: #8a6f4e;

      --font-display: "Special Elite", "Courier New", monospace;
      --font-body: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

      --radius: 6px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --kraft: #241f18;
        --desk: #100d09;
        --ink: #ece2cf;
        --ink-soft: #b9a480;
        --navy: #6f93c8;
        --red: #d97256;
        --sepia: #a6906f;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-body);
      background:
        radial-gradient(ellipse at 50% -10%, rgba(255, 255, 255, 0.05), transparent 60%),
        var(--desk);
      color: var(--ink);
      padding: 2rem 0.85rem;
    }

    .envelope {
      position: relative;
      width: 100%;
      max-width: 440px;
      background: var(--kraft);
      border-radius: var(--radius);
      padding: 2.25rem clamp(1.1rem, 6vw, 2rem) 2rem;
      box-shadow:
        0 1px 2px rgba(0, 0, 0, 0.25),
        0 20px 40px -12px rgba(0, 0, 0, 0.55);
      transform: rotate(-0.6deg);
      overflow: hidden;
    }

    .envelope::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 7px;
      background: repeating-linear-gradient(
        -45deg,
        var(--navy) 0 10px,
        var(--kraft) 10px 16px,
        var(--red) 16px 26px,
        var(--kraft) 26px 32px
      );
    }

    header {
      margin-top: 0.4rem;
    }

    .eyebrow {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--sepia);
      margin-bottom: 0.6rem;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      margin: 0 0 0.55rem;
      color: var(--ink);
    }

    p.subtitle {
      margin: 0 0 1.75rem;
      font-size: 0.94rem;
      line-height: 1.5;
      color: var(--ink-soft);
      max-width: 34ch;
    }

    form { margin: 0; }

    .cep-label {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--sepia);
      margin-bottom: 0.6rem;
    }

    .cep-boxes {
      display: flex;
      align-items: center;
      gap: clamp(0.2rem, 1.6vw, 0.4rem);
      margin-bottom: 1.4rem;
    }

    .cep-boxes .group {
      display: flex;
      gap: clamp(0.2rem, 1.6vw, 0.4rem);
    }

    .cep-dash {
      color: var(--sepia);
      font-family: var(--font-mono);
      font-size: 1.1rem;
      padding: 0 0.05rem;
      flex-shrink: 0;
    }

    .cep-digit {
      width: clamp(1.6rem, 8vw, 2.35rem);
      height: clamp(2.1rem, 10vw, 2.9rem);
      min-width: 0;
      text-align: center;
      font-family: var(--font-mono);
      font-size: clamp(0.95rem, 4vw, 1.2rem);
      font-weight: 500;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.35);
      border: 1.5px solid var(--sepia);
      border-radius: 4px;
      padding: 0;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }

    @media (prefers-color-scheme: dark) {
      .cep-digit { background: rgba(0, 0, 0, 0.2); }
    }

    .cep-digit:focus-visible {
      outline: none;
      border-color: var(--navy);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--navy) 25%, transparent);
    }

    .cep-boxes.invalid .cep-digit {
      border-color: var(--red);
    }

    @media (prefers-reduced-motion: no-preference) {
      .cep-boxes.shake { animation: shake 320ms ease; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(2px); }
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.85rem;
      border: 1.5px solid var(--navy);
      border-radius: 4px;
      background: var(--navy);
      color: var(--kraft);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.15s;
    }

    button[type="submit"]:hover { opacity: 0.92; }

    button[type="submit"]:active {
      transform: scale(0.97) rotate(-0.4deg);
    }

    button[type="submit"]:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    button[type="submit"]:focus-visible {
      outline: 2px solid var(--navy);
      outline-offset: 3px;
    }

    #message {
      margin-top: 0.9rem;
      font-size: 0.88rem;
      color: var(--red);
      min-height: 1.2em;
    }

    #message:empty { margin-top: 0; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ---- result ---- */

    #result {
      position: relative;
      display: none;
      margin-top: 1.75rem;
      padding-top: 1.4rem;
      border-top: 1.5px dashed var(--sepia);
    }

    #result.visible { display: block; }

    .result-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--sepia);
      margin: 0 0 0.9rem;
    }

    .address dd {
      margin: 0 0 0.15rem;
      font-size: 0.96rem;
      line-height: 1.45;
      color: var(--ink);
    }

    .address dd.city-line {
      font-weight: 600;
      margin-top: 0.15rem;
    }

    .address dd.cep-line {
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
      color: var(--ink-soft);
      margin-top: 0.35rem;
    }

    .meta {
      margin-top: 0.9rem;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      color: var(--sepia);
    }

    .result-actions {
      margin-top: 1.1rem;
    }

    .copy-btn {
      appearance: none;
      background: none;
      border: none;
      padding: 0;
      font-family: var(--font-mono);
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--navy);
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
    }

    .copy-btn:focus-visible {
      outline: 2px solid var(--navy);
      outline-offset: 3px;
    }

    /* postmark */

    .postmark {
      position: absolute;
      top: -0.4rem;
      right: -0.3rem;
      width: 92px;
      height: 92px;
      color: var(--red);
      opacity: 0.88;
      transform: rotate(-8deg);
      pointer-events: none;
    }

    @media (prefers-reduced-motion: no-preference) {
      .postmark {
        opacity: 0;
        transform: rotate(-18deg) scale(1.35);
      }
      #result.visible .postmark {
        animation: stamp 480ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
    }

    @keyframes stamp {
      0% { opacity: 0; transform: rotate(-18deg) scale(1.35); }
      55% { opacity: 1; transform: rotate(-5deg) scale(0.94); }
      100% { opacity: 0.88; transform: rotate(-8deg) scale(1); }
    }

    .postmark svg { width: 100%; height: 100%; display: block; }
    .postmark text { font-family: var(--font-display); fill: currentColor; }
    .postmark circle.ring { fill: none; stroke: currentColor; }
    .postmark path.wave { fill: none; stroke: currentColor; stroke-width: 1.4; opacity: 0.85; }

    footer {
      margin-top: 1.9rem;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      color: var(--sepia);
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <main class="envelope">
    <header>
      <span class="eyebrow">Busca postal</span>
      <h1>Consulta de CEP</h1>
      <p class="subtitle">Digite o CEP para ver o endereço correspondente.</p>
    </header>

    <form id="cep-form" novalidate>
      <span class="cep-label" id="cep-label">CEP</span>
      <div class="cep-boxes" id="cep-boxes" role="group" aria-labelledby="cep-label">
        <div class="group" data-group="1">
          <input class="cep-digit" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off" aria-label="Dígito 1 do CEP" />
          <input class="cep-digit" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off" aria-label="Dígito 2 do CEP" />
          <input class="cep-digit" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off" aria-label="Dígito 3 do CEP" />
          <input class="cep-digit" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off" aria-label="Dígito 4 do CEP" />
          <input class="cep-digit" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off" aria-label="Dígito 5 do CEP" />
        </div>
        <span class="cep-dash" aria-hidden="true">–</span>
        <div class="group" data-group="2">
          <input class="cep-digit" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off" aria-label="Dígito 6 do CEP" />
          <input class="cep-digit" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off" aria-label="Dígito 7 do CEP" />
          <input class="cep-digit" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off" aria-label="Dígito 8 do CEP" />
        </div>
      </div>

      <button type="submit" id="submit-btn">Consultar endereço</button>
    </form>

    <div id="message" role="alert"></div>
    <div id="status" class="sr-only" role="status" aria-live="polite"></div>

    <div id="result">
      <p class="result-eyebrow">Endereço encontrado</p>

      <svg class="postmark" viewBox="0 0 100 100" aria-hidden="true">
        <path id="postmark-arc" d="M 16,52 A 34,34 0 0 1 84,52" fill="none" />
        <circle class="ring" cx="50" cy="50" r="44" stroke-width="1.4" />
        <circle class="ring" cx="50" cy="50" r="37" stroke-width="1" stroke-dasharray="2 3" />
        <text font-size="7" letter-spacing="1.5">
          <textPath href="#postmark-arc" startOffset="50%" text-anchor="middle">GUIA DE CEP</textPath>
        </text>
        <text id="postmark-meta" x="50" y="58" font-size="8.5" text-anchor="middle"></text>
        <path class="wave" d="M14,70 q4,-6 8,0 t8,0 t8,0 t8,0 t8,0 t8,0" />
        <path class="wave" d="M14,78 q4,-6 8,0 t8,0 t8,0 t8,0 t8,0 t8,0" />
      </svg>

      <dl class="address">
        <dd id="r-logradouro"></dd>
        <dd id="r-bairro"></dd>
        <dd class="city-line" id="r-cidade"></dd>
        <dd class="cep-line" id="r-cep"></dd>
      </dl>

      <p class="meta" id="r-meta"></p>

      <div class="result-actions">
        <button type="button" class="copy-btn" id="copy-btn">Copiar endereço</button>
      </div>
    </div>

    <footer>viacep.com.br</footer>
  </main>

  <script type="module">
    const boxesContainer = document.getElementById("cep-boxes");
    const boxes = Array.from(boxesContainer.querySelectorAll(".cep-digit"));
    const form = document.getElementById("cep-form");
    const submitBtn = document.getElementById("submit-btn");
    const messageEl = document.getElementById("message");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const copyBtn = document.getElementById("copy-btn");

    const fields = {
      logradouro: document.getElementById("r-logradouro"),
      bairro: document.getElementById("r-bairro"),
      cidade: document.getElementById("r-cidade"),
      cep: document.getElementById("r-cep"),
      meta: document.getElementById("r-meta"),
      postmark: document.getElementById("postmark-meta"),
    };

    let lastAddressText = "";

    // ---- boxed CEP input ----

    boxes.forEach((box, i) => {
      box.addEventListener("focus", () => box.select());

      box.addEventListener("input", () => {
        box.value = box.value.replace(/\D/g, "").slice(0, 1);
        boxesContainer.classList.remove("invalid");
        if (box.value && i < boxes.length - 1) {
          boxes[i + 1].focus();
        }
      });

      box.addEventListener("keydown", (event) => {
        if (event.key === "Backspace" && !box.value && i > 0) {
          boxes[i - 1].focus();
        } else if (event.key === "ArrowLeft" && i > 0) {
          boxes[i - 1].focus();
        } else if (event.key === "ArrowRight" && i < boxes.length - 1) {
          boxes[i + 1].focus();
        }
      });

      box.addEventListener("paste", (event) => {
        const digits = (event.clipboardData.getData("text") || "").replace(/\D/g, "");
        if (!digits) return;
        event.preventDefault();
        digits.slice(0, boxes.length - i).split("").forEach((d, j) => {
          boxes[i + j].value = d;
        });
        const next = boxes[Math.min(i + digits.length, boxes.length - 1)];
        next.focus();
      });
    });

    function getCep() {
      return boxes.map((b) => b.value).join("");
    }

    function setCep(digits) {
      boxes.forEach((b, i) => { b.value = digits[i] || ""; });
    }

    // ---- lookup ----

    function normalizeCep(digits) {
      if (digits.length !== 8) {
        throw new Error("CEP inválido — digite os 8 números.");
      }
      return digits;
    }

    async function consultarCep(cep) {
      const cepLimpo = normalizeCep(cep);
      const url = `https://viacep.com.br/ws/${cepLimpo}/json/`;

      let res;
      try {
        res = await fetch(url);
      } catch {
        throw new Error("Não foi possível consultar agora. Tente de novo.");
      }
      if (!res.ok) {
        throw new Error("Não foi possível consultar agora. Tente de novo.");
      }

      const data = await res.json();
      if (data.erro) {
        throw new Error(`CEP ${cepLimpo} não encontrado.`);
      }

      return data;
    }

    function renderResult(data) {
      const hasComplemento = Boolean(data.complemento);
      fields.logradouro.textContent = [data.logradouro, hasComplemento ? data.complemento : null]
        .filter(Boolean)
        .join(", ") || "—";
      fields.logradouro.style.display = data.logradouro || hasComplemento ? "" : "none";

      fields.bairro.textContent = data.bairro || "";
      fields.bairro.style.display = data.bairro ? "" : "none";

      fields.cidade.textContent = `${data.localidade || "—"} – ${data.uf || "—"}`;
      fields.cep.textContent = data.cep || "";

      const metaParts = [];
      if (data.ibge) metaParts.push(`IBGE ${data.ibge}`);
      if (data.ddd) metaParts.push(`DDD ${data.ddd}`);
      fields.meta.textContent = metaParts.join(" · ");
      fields.meta.style.display = metaParts.length ? "" : "none";

      const MESES = ["JAN", "FEV", "MAR", "ABR", "MAI", "JUN", "JUL", "AGO", "SET", "OUT", "NOV", "DEZ"];
      const today = new Date();
      const dateStr = `${String(today.getDate()).padStart(2, "0")} ${MESES[today.getMonth()]} ${String(today.getFullYear()).slice(2)}`;
      fields.postmark.textContent = `${data.uf || "—"} · ${dateStr}`;

      lastAddressText = [
        [data.logradouro, data.complemento].filter(Boolean).join(", "),
        data.bairro,
        `${data.localidade || ""} – ${data.uf || ""}`,
        data.cep,
      ].filter(Boolean).join("\n");

      resultEl.classList.add("visible");
      copyBtn.textContent = "Copiar endereço";
      statusEl.textContent = `Endereço encontrado para o CEP ${data.cep}.`;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      messageEl.textContent = "";
      boxesContainer.classList.remove("invalid", "shake");
      resultEl.classList.remove("visible");
      submitBtn.disabled = true;
      submitBtn.textContent = "Consultando…";

      try {
        const data = await consultarCep(getCep());
        renderResult(data);
      } catch (err) {
        messageEl.textContent = err.message;
        boxesContainer.classList.add("invalid");
        requestAnimationFrame(() => boxesContainer.classList.add("shake"));
        statusEl.textContent = err.message;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Consultar endereço";
      }
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(lastAddressText);
        copyBtn.textContent = "Copiado!";
        setTimeout(() => { copyBtn.textContent = "Copiar endereço"; }, 2000);
      } catch {
        copyBtn.textContent = "Não foi possível copiar";
        setTimeout(() => { copyBtn.textContent = "Copiar endereço"; }, 2000);
      }
    });

    boxes[0].focus();
  </script>
</body>
</html>
