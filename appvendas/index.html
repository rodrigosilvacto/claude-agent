<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AppVendas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/styles.css?v=9" />
</head>
<body>
  <div class="app-shell is-locked" id="app-shell">
    <div class="sidebar-scrim" id="sidebar-scrim"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">
        <span class="sidebar__brand-mark">AV</span>
        <span class="sidebar__brand-name">AppVendas</span>
        <button type="button" class="sidebar__close" id="sidebar-close" aria-label="Fechar menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
        </button>
      </div>

      <nav class="sidebar__nav" aria-label="Navegação principal">
        <div class="nav-group">
          <a class="nav-link" href="#/home" data-route="home">
            <svg class="nav-link__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 9-8 9 8"/><path d="M5 10v10a1 1 0 0 0 1 1h3v-6h6v6h3a1 1 0 0 0 1-1V10"/></svg>
            <span>Início</span>
          </a>
        </div>

        <div class="nav-group">
          <p class="nav-group__title">Cadastros</p>
          <a class="nav-link" href="#/clientes" data-route="clientes">
            <svg class="nav-link__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Clientes</span>
          </a>
          <a class="nav-link" href="#/produtos" data-route="produtos">
            <svg class="nav-link__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4a2 2 0 0 0 1-1.73Z"/><path d="M3.29 7 12 12l8.71-5"/><path d="M12 22V12"/></svg>
            <span>Produtos</span>
          </a>
          <a class="nav-link" href="#/fornecedores" data-route="fornecedores">
            <svg class="nav-link__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg>
            <span>Fornecedores</span>
          </a>
        </div>

        <div class="nav-group">
          <p class="nav-group__title">Vendas</p>
          <a class="nav-link" href="#/vendas" data-route="vendas">
            <svg class="nav-link__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M8 7h8"/><path d="M8 11h8"/><path d="M8 15h5"/></svg>
            <span>Movimentação de Vendas</span>
          </a>
        </div>

        <div class="nav-group">
          <p class="nav-group__title">Relatórios</p>
          <a class="nav-link" href="#/relatorios" data-route="relatorios">
            <svg class="nav-link__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
            <span>Visão geral</span>
          </a>
        </div>

        <div class="nav-group">
          <p class="nav-group__title">Administração</p>
          <a class="nav-link" href="./pre-cadastro.html" target="_blank" rel="noopener">
            <svg class="nav-link__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6"/><path d="M22 11h-6"/></svg>
            <span>Pré-Cadastro</span>
          </a>
          <a class="nav-link" href="#/usuarios" data-route="usuarios" id="nav-usuarios" hidden>
            <svg class="nav-link__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="m16 3.13 1 .1a4 4 0 0 1 0 7.75"/><path d="M19.5 15.5 21 17l3-3"/></svg>
            <span>Usuários</span>
          </a>
        </div>
      </nav>

      <div class="sidebar__footer">
        <div class="user-chip">
          <span class="user-chip__avatar" id="user-chip-avatar">–</span>
          <div>
            <p class="user-chip__name" id="user-chip-name">—</p>
            <p class="user-chip__meta" id="user-chip-meta">—</p>
          </div>
        </div>
        <button type="button" class="logout-btn" id="logout-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
          <span>Sair</span>
        </button>
      </div>
    </aside>

    <div class="main-column">
      <header class="topbar">
        <div class="topbar__heading">
          <button type="button" class="menu-toggle" id="menu-toggle" aria-label="Abrir menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16"/><path d="M4 6h16"/><path d="M4 18h16"/></svg>
          </button>
          <div>
            <p class="topbar__breadcrumb" id="breadcrumb">Início</p>
            <h1 class="topbar__title" id="page-title">Painel do dia</h1>
          </div>
        </div>
        <div class="topbar__actions" id="topbar-actions"></div>
      </header>

      <main class="view" id="view" aria-live="polite"></main>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" id="modal">
      <div class="modal__header">
        <h2 id="modal-title"></h2>
        <button type="button" class="icon-btn" id="modal-close" aria-label="Fechar">&times;</button>
      </div>
      <div class="modal__body" id="modal-body"></div>
    </div>
  </div>

  <div class="toast-stack" id="toast-stack" aria-live="assertive"></div>

  <script type="module" src="./assets/app.js"></script>
</body>
</html>
