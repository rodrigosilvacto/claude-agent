<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pré-cadastro de cliente · AppVendas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/styles.css?v=14" />
</head>
<body>
  <div class="precadastro-screen">
    <div class="precadastro-card">
      <div class="login-card__brand">
        <span class="sidebar__brand-mark" style="background: var(--accent);">AV</span>
        <span class="login-card__brand-name">AppVendas</span>
      </div>
      <h1 class="precadastro-title">Faça parte da nossa base de clientes</h1>
      <p class="login-card__hint">Preencha seus dados abaixo. Nossa equipe analisa o cadastro e, assim que aprovado, você já pode ser identificado nas suas próximas compras.</p>

      <form id="precadastro-form">
        <div id="precadastro-error"></div>
        <div class="form-grid">
          <div class="field field--full">
            <label for="pc-nome">Nome<span class="field-required">*</span></label>
            <input class="input" type="text" id="pc-nome" name="nome" required />
          </div>
          <div class="field field--full">
            <label for="pc-documento">CPF/CNPJ<span class="field-required">*</span></label>
            <input class="input" type="text" id="pc-documento" name="documento" placeholder="Só números ou com pontuação" required />
          </div>
          <div class="field field--full">
            <label for="pc-cep">CEP</label>
            <input class="input" type="text" id="pc-cep" name="cep" placeholder="00000-000" inputmode="numeric" />
            <p class="field-hint" id="pc-cep-hint" hidden></p>
          </div>
          <div class="field field--full">
            <label for="pc-endereco">Endereço</label>
            <input class="input" type="text" id="pc-endereco" name="endereco" />
          </div>
          <div class="field">
            <label for="pc-cidade">Cidade</label>
            <input class="input" type="text" id="pc-cidade" name="cidade" />
          </div>
          <div class="field">
            <label for="pc-uf">UF</label>
            <input class="input" type="text" id="pc-uf" name="uf" maxlength="2" style="text-transform: uppercase;" />
          </div>
          <div class="field">
            <label for="pc-email">E-mail</label>
            <input class="input" type="email" id="pc-email" name="email" />
          </div>
          <div class="field">
            <label for="pc-telefone">Telefone</label>
            <input class="input" type="text" id="pc-telefone" name="telefone" />
          </div>
        </div>
        <div class="hp-field" aria-hidden="true">
          <label for="pc-website">Deixe este campo em branco</label>
          <input type="text" id="pc-website" name="website" tabindex="-1" autocomplete="off" />
        </div>
        <button type="submit" class="btn btn--primary" id="precadastro-submit" style="width:100%; justify-content:center; margin-top: 1.25rem;">Enviar cadastro</button>
      </form>

      <div id="precadastro-success" hidden></div>
    </div>
  </div>

  <script type="module" src="./assets/pre-cadastro.js?v=3"></script>
</body>
</html>
