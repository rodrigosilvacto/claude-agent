<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Post para LinkedIn</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      padding: 1.5rem;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #16161a; }
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }
    @media (prefers-color-scheme: dark) {
      .card { background: #232329; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4); }
    }
    h1 {
      font-size: 1.4rem;
      margin: 0 0 0.4rem;
      color: #1d1d1f;
    }
    @media (prefers-color-scheme: dark) {
      h1 { color: #f2f2f2; }
    }
    p.subtitle {
      margin: 0 0 1.5rem;
      font-size: 0.9rem;
      color: #6e6e73;
    }
    @media (prefers-color-scheme: dark) {
      p.subtitle { color: #a1a1a6; }
    }
    p.build-info {
      margin: -1rem 0 1.5rem;
      font-size: 0.72rem;
      color: #a1a1a6;
    }
    @media (prefers-color-scheme: dark) {
      p.build-info { color: #6e6e73; }
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: #444;
    }
    @media (prefers-color-scheme: dark) {
      label { color: #ccc; }
    }
    input, select, textarea {
      width: 100%;
      padding: 0.7rem 0.9rem;
      margin-bottom: 1.1rem;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      background: #fff;
      color: #1d1d1f;
    }
    @media (prefers-color-scheme: dark) {
      input, select, textarea {
        background: #17171c;
        border-color: #3a3a40;
        color: #f2f2f2;
      }
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #0071e3;
    }
    button {
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 8px;
      background: #0071e3;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    button.secondary {
      background: transparent;
      color: #0071e3;
      border: 1px solid #0071e3;
      margin-top: 0.7rem;
    }
    #message {
      margin-top: 1rem;
      font-size: 0.9rem;
      text-align: center;
      min-height: 1.2em;
    }
    #message.error { color: #d92d20; }
    #result-wrapper {
      display: none;
      margin-top: 1.5rem;
    }
    #result {
      width: 100%;
      min-height: 260px;
      resize: vertical;
      line-height: 1.45;
    }
    #grade-wrapper {
      display: none;
      margin-top: 1.2rem;
      padding: 0.9rem 1rem;
      border-radius: 10px;
      border: 1px solid #d2d2d7;
    }
    @media (prefers-color-scheme: dark) {
      #grade-wrapper { border-color: #3a3a40; }
    }
    #grade-wrapper.grade-good { border-color: #1a8a3f; background: rgba(26, 138, 63, 0.08); }
    #grade-wrapper.grade-bad { border-color: #d92d20; background: rgba(217, 45, 32, 0.08); }
    #grade-wrapper.grade-warn { border-color: #b96a00; background: rgba(185, 106, 0, 0.08); }
    #grade-label {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 0.3rem;
    }
    #grade-justificativa {
      margin: 0;
      font-size: 0.85rem;
      color: #444;
    }
    @media (prefers-color-scheme: dark) {
      #grade-justificativa { color: #ccc; }
    }
    #feedback-wrapper {
      margin-top: 1.2rem;
    }
    #feedback-wrapper textarea {
      resize: vertical;
      min-height: 60px;
    }

    /* Animação do pipeline: agente escritor -> agente avaliador -> concluído */
    #pipeline {
      display: none;
      margin-bottom: 1.6rem;
    }
    #pipeline .pipeline-row {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #pipeline .pipeline-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      width: 92px;
      opacity: 0.4;
      transition: opacity 0.25s;
    }
    #pipeline .pipeline-step.active,
    #pipeline .pipeline-step.done {
      opacity: 1;
    }
    #pipeline .pipeline-icon {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      background: #eceef1;
      border: 2px solid #d2d2d7;
      transition: background 0.25s, border-color 0.25s, transform 0.2s;
    }
    @media (prefers-color-scheme: dark) {
      #pipeline .pipeline-icon { background: #1c1c22; border-color: #3a3a40; }
    }
    #pipeline .pipeline-step.active .pipeline-icon {
      border-color: #0071e3;
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
      animation: pipeline-pulse 1.1s ease-in-out infinite;
    }
    #pipeline .pipeline-step.done .pipeline-icon {
      background: #0071e3;
      border-color: #0071e3;
    }
    #pipeline .pipeline-label {
      font-size: 0.72rem;
      text-align: center;
      line-height: 1.2;
      color: #444;
      min-height: 1.9em;
    }
    @media (prefers-color-scheme: dark) {
      #pipeline .pipeline-label { color: #ccc; }
    }
    #pipeline .pipeline-line {
      flex: 0 0 40px;
      height: 2px;
      margin-top: -22px;
      background: #d2d2d7;
      position: relative;
      overflow: hidden;
    }
    @media (prefers-color-scheme: dark) {
      #pipeline .pipeline-line { background: #3a3a40; }
    }
    #pipeline .pipeline-line::after {
      content: "";
      position: absolute;
      inset: 0;
      background: #0071e3;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }
    #pipeline .pipeline-line.filled::after {
      transform: scaleX(1);
    }
    @keyframes pipeline-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="pipeline">
      <div class="pipeline-row">
        <div class="pipeline-step" id="pipeline-write">
          <div class="pipeline-icon">✍️</div>
          <div class="pipeline-label">Agente escritor gerando o post</div>
        </div>
        <div class="pipeline-line" id="pipeline-line-1"></div>
        <div class="pipeline-step" id="pipeline-grade">
          <div class="pipeline-icon">🔎</div>
          <div class="pipeline-label">Agente escritor chama o agente avaliador</div>
        </div>
        <div class="pipeline-line" id="pipeline-line-2"></div>
        <div class="pipeline-step" id="pipeline-done">
          <div class="pipeline-icon">✅</div>
          <div class="pipeline-label">Concluído</div>
        </div>
      </div>
    </div>

    <h1>Gerador de Post para LinkedIn</h1>
    <p class="subtitle">Descreva um tema e receba um texto pronto para publicar.</p>
    <p class="build-info">build: <strong>2026-07-10 13:01 UTC</strong> — se essa data não bater com o último push, o navegador está com cache antigo.</p>

    <form id="generate-form">
      <label for="theme">Tema</label>
      <input type="text" id="theme" name="theme" required maxlength="300"
        placeholder="Ex: liderança em times remotos" autocomplete="off" />

      <label for="tone">Tom</label>
      <select id="tone" name="tone">
        <option value="profissional">Profissional</option>
        <option value="inspirador">Inspirador</option>
        <option value="storytelling">Storytelling</option>
        <option value="objetivo">Direto / objetivo</option>
      </select>

      <button type="submit" id="submit-btn">Gerar post</button>
    </form>
    <div id="message"></div>

    <div id="result-wrapper">
      <label for="result">Resultado</label>
      <textarea id="result" readonly></textarea>
      <button type="button" class="secondary" id="copy-btn">Copiar texto</button>

      <div id="grade-wrapper">
        <div id="grade-label"></div>
        <p id="grade-justificativa"></p>
      </div>

      <div id="feedback-wrapper">
        <label for="feedback">Não ficou como você queria? Peça um ajuste</label>
        <textarea id="feedback" maxlength="500" rows="2"
          placeholder="Ex: deixe mais curto e menos formal, remova as hashtags..."></textarea>
        <button type="button" class="secondary" id="feedback-btn">Gerar novo texto com esse feedback</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://xtrvojnauvkkterogrst.supabase.co";
    const SUPABASE_KEY = "sb_publishable_JmhdMN8S7lSpCeaJANw_lQ_RRwZ2_OT";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById("generate-form");
    const messageEl = document.getElementById("message");
    const submitBtn = document.getElementById("submit-btn");
    const resultWrapper = document.getElementById("result-wrapper");
    const resultEl = document.getElementById("result");
    const copyBtn = document.getElementById("copy-btn");
    const gradeWrapper = document.getElementById("grade-wrapper");
    const gradeLabelEl = document.getElementById("grade-label");
    const gradeJustificativaEl = document.getElementById("grade-justificativa");
    const feedbackEl = document.getElementById("feedback");
    const feedbackBtn = document.getElementById("feedback-btn");

    const pipelineEl = document.getElementById("pipeline");
    const pipelineSteps = {
      write: document.getElementById("pipeline-write"),
      grade: document.getElementById("pipeline-grade"),
      done: document.getElementById("pipeline-done"),
    };
    const pipelineLines = [
      document.getElementById("pipeline-line-1"),
      document.getElementById("pipeline-line-2"),
    ];
    let pipelineTimer = null;

    function setPipelineStage(stage) {
      Object.values(pipelineSteps).forEach((el) => el.classList.remove("active", "done"));
      pipelineLines.forEach((el) => el.classList.remove("filled"));

      if (stage === "write") {
        pipelineSteps.write.classList.add("active");
      } else if (stage === "grade") {
        pipelineSteps.write.classList.add("done");
        pipelineLines[0].classList.add("filled");
        pipelineSteps.grade.classList.add("active");
      } else if (stage === "done") {
        pipelineSteps.write.classList.add("done");
        pipelineSteps.grade.classList.add("done");
        pipelineSteps.done.classList.add("done");
        pipelineLines[0].classList.add("filled");
        pipelineLines[1].classList.add("filled");
      }
    }

    function startPipeline() {
      pipelineEl.style.display = "block";
      setPipelineStage("write");
      // Agente 1 (escritor) está trabalhando; depois de um tempo, simula a
      // chamada ao agente 2 (avaliador) — a troca real acontece no backend,
      // então isso é uma representação visual do que já está ocorrendo lá.
      pipelineTimer = setTimeout(() => setPipelineStage("grade"), 1400);
    }

    function finishPipeline(success) {
      clearTimeout(pipelineTimer);
      if (success) {
        setPipelineStage("done");
      } else {
        pipelineEl.style.display = "none";
      }
    }

    const GRADE_LABELS = {
      executivo: "Texto executivo bem formatado",
      tecnico: "Texto técnico bem formatado",
      pessimo: "Texto péssimo",
      reescrever: "Reescrever",
    };
    const GRADE_STYLES = {
      executivo: "grade-good",
      tecnico: "grade-good",
      pessimo: "grade-bad",
      reescrever: "grade-warn",
    };

    function renderGrade(grade) {
      gradeWrapper.className = "";
      if (!grade || !grade.categoria) {
        gradeWrapper.style.display = "none";
        return;
      }
      const label = GRADE_LABELS[grade.categoria] || grade.categoria;
      gradeLabelEl.textContent = grade.nota ? `${label} — nota ${grade.nota}/10` : label;
      gradeJustificativaEl.textContent = grade.justificativa || "";
      gradeWrapper.classList.add(GRADE_STYLES[grade.categoria] || "");
      gradeWrapper.style.display = "block";
    }

    // Chama o agente 1 (que por sua vez chama o agente 2 internamente) e
    // atualiza a tela com o resultado. Usado tanto na geração inicial quanto
    // na regeneração a partir do feedback do usuário.
    async function runGeneration(body, busyButton, busyText, idleText) {
      busyButton.disabled = true;
      busyButton.textContent = busyText;
      messageEl.textContent = "";
      messageEl.className = "";
      gradeWrapper.style.display = "none";
      startPipeline();

      const { data, error } = await supabase.functions.invoke("generate-linkedin-post", { body });

      if (error || !data?.post) {
        messageEl.textContent = data?.error || error?.message || "Erro ao gerar o post.";
        messageEl.className = "error";
        finishPipeline(false);
      } else {
        resultEl.value = data.post;
        resultWrapper.style.display = "block";
        renderGrade(data.grade);
        finishPipeline(true);
        feedbackEl.value = "";
      }

      busyButton.disabled = false;
      busyButton.textContent = idleText;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      resultWrapper.style.display = "none";

      const theme = document.getElementById("theme").value.trim();
      const tone = document.getElementById("tone").value;

      await runGeneration({ theme, tone }, submitBtn, "Gerando...", "Gerar post");
    });

    feedbackBtn.addEventListener("click", async () => {
      const feedback = feedbackEl.value.trim();
      if (!feedback) {
        feedbackEl.focus();
        return;
      }

      const theme = document.getElementById("theme").value.trim();
      const tone = document.getElementById("tone").value;
      const previousPost = resultEl.value;

      await runGeneration(
        { theme, tone, feedback, previousPost },
        feedbackBtn,
        "Aplicando feedback...",
        "Gerar novo texto com esse feedback",
      );
    });

    copyBtn.addEventListener("click", async () => {
      await navigator.clipboard.writeText(resultEl.value);
      copyBtn.textContent = "Copiado!";
      setTimeout(() => { copyBtn.textContent = "Copiar texto"; }, 1500);
    });
  </script>
</body>
</html>
