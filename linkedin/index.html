<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Post para LinkedIn</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      padding: 1.5rem;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #16161a; }
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }
    @media (prefers-color-scheme: dark) {
      .card { background: #232329; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4); }
    }
    h1 {
      font-size: 1.4rem;
      margin: 0 0 0.4rem;
      color: #1d1d1f;
    }
    @media (prefers-color-scheme: dark) {
      h1 { color: #f2f2f2; }
    }
    p.subtitle {
      margin: 0 0 1.5rem;
      font-size: 0.9rem;
      color: #6e6e73;
    }
    @media (prefers-color-scheme: dark) {
      p.subtitle { color: #a1a1a6; }
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: #444;
    }
    @media (prefers-color-scheme: dark) {
      label { color: #ccc; }
    }
    input, select, textarea {
      width: 100%;
      padding: 0.7rem 0.9rem;
      margin-bottom: 1.1rem;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      background: #fff;
      color: #1d1d1f;
    }
    @media (prefers-color-scheme: dark) {
      input, select, textarea {
        background: #17171c;
        border-color: #3a3a40;
        color: #f2f2f2;
      }
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #0071e3;
    }
    button {
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 8px;
      background: #0071e3;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    button.secondary {
      background: transparent;
      color: #0071e3;
      border: 1px solid #0071e3;
      margin-top: 0.7rem;
    }
    #message {
      margin-top: 1rem;
      font-size: 0.9rem;
      text-align: center;
      min-height: 1.2em;
    }
    #message.error { color: #d92d20; }
    #result-wrapper {
      display: none;
      margin-top: 1.5rem;
    }
    #result {
      width: 100%;
      min-height: 260px;
      resize: vertical;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Gerador de Post para LinkedIn</h1>
    <p class="subtitle">Descreva um tema e receba um texto pronto para publicar.</p>

    <form id="generate-form">
      <label for="theme">Tema</label>
      <input type="text" id="theme" name="theme" required maxlength="300"
        placeholder="Ex: liderança em times remotos" autocomplete="off" />

      <label for="tone">Tom</label>
      <select id="tone" name="tone">
        <option value="profissional">Profissional</option>
        <option value="inspirador">Inspirador</option>
        <option value="storytelling">Storytelling</option>
        <option value="objetivo">Direto / objetivo</option>
      </select>

      <button type="submit" id="submit-btn">Gerar post</button>
    </form>
    <div id="message"></div>

    <div id="result-wrapper">
      <label for="result">Resultado</label>
      <textarea id="result" readonly></textarea>
      <button type="button" class="secondary" id="copy-btn">Copiar texto</button>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://xtrvojnauvkkterogrst.supabase.co";
    const SUPABASE_KEY = "sb_publishable_JmhdMN8S7lSpCeaJANw_lQ_RRwZ2_OT";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById("generate-form");
    const messageEl = document.getElementById("message");
    const submitBtn = document.getElementById("submit-btn");
    const resultWrapper = document.getElementById("result-wrapper");
    const resultEl = document.getElementById("result");
    const copyBtn = document.getElementById("copy-btn");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = "Gerando...";
      messageEl.textContent = "";
      messageEl.className = "";
      resultWrapper.style.display = "none";

      const theme = document.getElementById("theme").value.trim();
      const tone = document.getElementById("tone").value;

      const { data, error } = await supabase.functions.invoke("generate-linkedin-post", {
        body: { theme, tone },
      });

      if (error || !data?.post) {
        messageEl.textContent = data?.error || error?.message || "Erro ao gerar o post.";
        messageEl.className = "error";
      } else {
        resultEl.value = data.post;
        resultWrapper.style.display = "block";
      }

      submitBtn.disabled = false;
      submitBtn.textContent = "Gerar post";
    });

    copyBtn.addEventListener("click", async () => {
      await navigator.clipboard.writeText(resultEl.value);
      copyBtn.textContent = "Copiado!";
      setTimeout(() => { copyBtn.textContent = "Copiar texto"; }, 1500);
    });
  </script>
</body>
</html>
