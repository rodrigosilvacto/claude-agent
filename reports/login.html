<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Painel de Reports</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <div class="center-card">
    <div class="card">
      <h1 style="margin-top:0; font-size:1.3rem;">Painel de Reports</h1>
      <p class="hint" style="margin-bottom:1.25rem;">Acesso restrito ao time. Informe seu email para receber um link de acesso.</p>
      <form id="login-form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="voce@empresa.com" />
        </div>
        <button type="submit" id="submit-btn" style="width:100%;">Enviar link de acesso</button>
      </form>
      <div id="message" class="message"></div>
    </div>
  </div>

  <script type="module">
    import { supabase } from "./assets/supabaseClient.js";

    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.replace("./index.html");
    }

    const form = document.getElementById("login-form");
    const messageEl = document.getElementById("message");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      submitBtn.disabled = true;
      messageEl.textContent = "";
      messageEl.className = "message";

      const email = document.getElementById("email").value.trim();
      const redirectTo = new URL("./index.html", window.location.href).toString();

      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: redirectTo },
      });

      if (error) {
        messageEl.textContent = "Erro ao enviar link: " + error.message;
        messageEl.className = "message error";
      } else {
        messageEl.textContent = "Link enviado! Verifique seu email para acessar o painel.";
        messageEl.className = "message success";
        form.reset();
      }

      submitBtn.disabled = false;
    });

    supabase.auth.onAuthStateChange((event, session) => {
      if (session) {
        window.location.replace("./index.html");
      }
    });
  </script>
</body>
</html>
